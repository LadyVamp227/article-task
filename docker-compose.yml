# Shared config for the three PHP containers (app, queue, scheduler).
x-php: &php
  build:
    context: .
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
  image: survey-app
  restart: unless-stopped
  volumes:
    - .:/var/www

services:
  # PHP-FPM application. Also bootstraps the shared volume on first start:
  # installs dependencies, generates the app key, and runs migrations.
  app:
    <<: *php
    depends_on:
      db:
        condition: service_healthy

  # Nginx web server.
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # Queue worker: processes survey responses in the background.
  queue:
    <<: *php
    command: php artisan queue:work --max-time=3600
    environment:
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started

  # Scheduler: runs Laravel's scheduled tasks (response reconciliation).
  scheduler:
    <<: *php
    command: php artisan schedule:work
    environment:
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started

  # PostgreSQL database.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-survey}
      POSTGRES_USER: ${DB_USERNAME:-survey}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_FORWARD_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-survey} -d ${DB_DATABASE:-survey}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Vite dev server: installs node modules and serves front-end assets (HMR).
  vite:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www

volumes:
  pgdata:
